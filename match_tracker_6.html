<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --felt: #0A0A0A;
    --felt-deep: #000000;
    --chalk: #F7F5F1;
    --brass: #2F9C5D;
    --brass-bright: #45C077;
    --ink: #172420;
    --ink-soft: #55625A;
    --loss-red: #8C2A2A;
    --win-green: #2F6B4F;
    --line: rgba(23, 36, 30, 0.12);
    font-family: 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; }

  .mt-root {
    background: var(--felt);
    color: var(--ink);
    min-height: 100%;
    border-radius: 12px;
    overflow: hidden;
  }

  .mt-hero { padding: 26px 24px 18px; border-bottom: 3px solid var(--brass); text-align: center; background-color: var(--felt); background-image: url('assets/trophy-bg.png'); background-repeat: no-repeat; background-position: right -10px top -10px; background-size: 100px auto; }
  .mt-logo { max-width: 320px; width: 70%; height: auto; margin: 0 auto 10px; display: block; }
  .mt-eyebrow { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.28em; color: var(--brass-bright); text-transform: uppercase; margin: 0; }
  .mt-title { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 25px; color: var(--chalk); margin: 0; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }

  .mt-tabs { display: flex; gap: 4px; padding: 0 16px; background: var(--felt-deep); border-bottom: 1px solid rgba(255,255,255,0.08); overflow-x: auto; }
  .mt-tab { font-family: 'Playfair Display', serif; font-weight: 600; font-size: 13px; letter-spacing: 0.03em; color: rgba(246,242,233,0.55); background: transparent; border: none; padding: 12px 12px; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
  .mt-tab:hover { color: rgba(246,242,233,0.85); }
  .mt-tab.active { color: var(--brass-bright); border-bottom-color: var(--brass); }

  .mt-body { background: var(--chalk); padding: 20px; min-height: 420px; }
  .mt-panel { display: none; }
  .mt-panel.active { display: block; animation: mtFade 0.2s ease; }
  @keyframes mtFade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .mt-card { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
  .mt-label { display: block; font-size: 12px; font-weight: 700; color: var(--ink-soft); margin-bottom: 6px; }
  .mt-row { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .mt-row > div { flex: 1; min-width: 130px; }

  input[type="text"], input[type="date"], input[type="number"], select {
    width: 100%; padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 7px;
    font-size: 14px; font-family: 'Noto Sans JP', sans-serif; color: var(--ink); background: var(--chalk);
  }
  input:focus, select:focus { outline: none; border-color: var(--brass); background: #fff; }

  .mt-photo-row { display: flex; align-items: center; gap: 12px; }
  .mt-photo-drop {
    flex: 1; border: 1.5px dashed var(--line); border-radius: 8px; padding: 16px; text-align: center;
    cursor: pointer; color: var(--ink-soft); font-size: 13px; background: var(--chalk);
  }
  .mt-photo-drop:hover { border-color: var(--brass); }
  .mt-photo-preview { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 1.5px solid var(--line); display: none; flex-shrink: 0; }
  .mt-photo-clear { font-size: 12px; color: var(--loss-red); background: none; border: none; cursor: pointer; margin-top: 6px; display: none; }

  .mt-submit { width: 100%; padding: 13px; background: var(--brass); color: var(--felt-deep); border: none; border-radius: 8px; font-family: 'Playfair Display', serif; font-weight: 700; font-size: 15px; letter-spacing: 0.03em; cursor: pointer; }
  .mt-submit:hover { background: var(--brass-bright); }
  .mt-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .mt-toast { margin-top: 10px; font-size: 13px; font-weight: 500; color: var(--win-green); display: none; }
  .mt-error { margin-top: 10px; font-size: 13px; font-weight: 500; color: var(--loss-red); display: none; }

  .mt-lb-row { display: grid; grid-template-columns: 32px 1fr auto; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px solid var(--line); }
  .mt-lb-row:last-child { border-bottom: none; }
  .mt-rank { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 16px; color: var(--ink-soft); text-align: center; }
  .mt-lb-row:nth-child(1) .mt-rank { color: var(--brass); font-size: 20px; }
  .mt-lb-name { font-family: 'Playfair Display', serif; font-weight: 600; font-size: 16px; }
  .mt-lb-sub { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
  .mt-lb-points { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 20px; color: var(--felt); text-align: right; }
  .mt-lb-points span { font-size: 11px; font-weight: 400; color: var(--ink-soft); margin-left: 3px; }

  .mt-empty { text-align: center; padding: 40px 20px; color: var(--ink-soft); font-size: 14px; }

  .mt-hist-item { display: flex; gap: 12px; padding: 12px 14px; border-bottom: 1px solid var(--line); font-size: 13px; background: #fff; }
  .mt-hist-item:last-child { border-bottom: none; }
  .mt-hist-item.is-settled { background: #E7E5E1; }
  .mt-settle-toggle { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; flex-shrink: 0; width: 54px; text-align: center; cursor: pointer; align-self: center; }
  .mt-settle-toggle input { width: 16px; height: 16px; cursor: pointer; accent-color: var(--brass); }
  .mt-settle-toggle span { font-size: 9px; line-height: 1.3; color: var(--ink-soft); }
  .mt-hist-thumb { width: 52px; height: 52px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--chalk); }
  .mt-hist-main { flex: 1; min-width: 0; }
  .mt-hist-title { font-family: 'Playfair Display', serif; font-weight: 600; font-size: 14px; }
  .mt-hist-tags { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
  .mt-hist-note { font-size: 12px; color: var(--ink-soft); margin-top: 3px; }
  .mt-hist-pts { font-family: 'Space Mono', monospace; font-weight: 700; color: var(--felt); align-self: center; white-space: nowrap; flex-shrink: 0; text-align: right; }
  .mt-hist-pts span { font-size: 11px; font-weight: 400; color: var(--ink-soft); margin-left: 2px; }
  .mt-hist-pts small { display: block; font-family: 'Noto Sans JP', sans-serif; font-size: 10px; font-weight: 500; color: var(--ink-soft); }
  .mt-del { background: none; border: none; color: var(--loss-red); cursor: pointer; font-size: 16px; padding: 0 4px; opacity: 0.6; align-self: center; }
  .mt-del:hover { opacity: 1; }

  .mt-settings-desc { font-size: 12px; color: var(--ink-soft); margin: -8px 0 14px; line-height: 1.6; }

  .mt-chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .mt-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--chalk); border: 1px solid var(--line); border-radius: 20px; padding: 5px 6px 5px 12px; font-size: 12px; }
  .mt-chip button { background: none; border: none; color: var(--loss-red); cursor: pointer; font-size: 14px; line-height: 1; padding: 2px 4px; }
  .mt-add-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .mt-add-row input { flex: 1; }
  .mt-add-tag { font-size: 12px; color: var(--felt); background: none; border: 1px dashed var(--line); border-radius: 6px; padding: 8px 14px; cursor: pointer; white-space: nowrap; }

  .mt-matrix-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; }
  table.mt-matrix { border-collapse: collapse; width: 100%; min-width: 420px; }
  table.mt-matrix th, table.mt-matrix td { border: 1px solid var(--line); padding: 6px; text-align: center; font-size: 12px; }
  table.mt-matrix thead th { background: var(--felt); color: var(--chalk); font-family: 'Playfair Display', serif; font-weight: 600; font-size: 12px; }
  table.mt-matrix tbody th { text-align: left; background: var(--chalk); font-weight: 600; white-space: nowrap; padding-left: 10px; }
  table.mt-matrix input[type="number"] { width: 56px; padding: 4px; text-align: center; font-size: 12px; }

  .mt-share-note { background: rgba(47,156,93,0.08); border: 1px solid rgba(47,156,93,0.3); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--ink-soft); margin-bottom: 16px; line-height: 1.6; }

  .mt-edit-banner { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: rgba(47,156,93,0.12); border: 1px solid var(--brass); border-radius: 8px; padding: 10px 14px; font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 16px; }
  .mt-edit-banner button { font-size: 12px; color: var(--felt); background: none; border: 1px solid var(--line); border-radius: 6px; padding: 6px 10px; cursor: pointer; white-space: nowrap; }

  .mt-hist-actions { display: flex; flex-direction: column; gap: 4px; align-self: center; flex-shrink: 0; }
  .mt-edit { background: none; border: none; color: var(--brass); cursor: pointer; font-size: 15px; padding: 0 4px; opacity: 0.7; }
  .mt-edit:hover { opacity: 1; }

  .mt-year-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .mt-year-pill { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; background: #fff; border: 1.5px solid var(--line); border-radius: 20px; padding: 6px 14px; cursor: pointer; color: var(--ink-soft); }
  .mt-year-pill:hover { border-color: var(--brass); }
  .mt-year-pill.active { background: var(--brass); border-color: var(--brass); color: #fff; }
</style>

<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js" defer></script>
<script>
(function() {
  const DEFAULT_RANKS = ['SSG', 'SG', 'G1', 'G2', 'G3'];
  const DEFAULT_RESULTS = ['予選敗退', 'ベスト64', 'ベスト32', 'ベスト16', 'ベスト8', 'ベスト4', '準優勝', '優勝'];
  const DEFAULT_MATRIX = {
    '予選敗退': { SSG: 10, SG: 10, G1: 10, G2: 10, G3: 10 },
    'ベスト64': { SSG: 100, SG: 50, G1: 20, G2: 10, G3: 10 },
    'ベスト32': { SSG: 200, SG: 100, G1: 50, G2: 30, G3: 10 },
    'ベスト16': { SSG: 300, SG: 200, G1: 100, G2: 80, G3: 50 },
    'ベスト8': { SSG: 400, SG: 300, G1: 200, G2: 150, G3: 80 },
    'ベスト4': { SSG: 500, SG: 400, G1: 300, G2: 250, G3: 100 },
    '準優勝': { SSG: 600, SG: 500, G1: 400, G2: 300, G3: 200 },
    '優勝': { SSG: 700, SG: 600, G1: 500, G2: 400, G3: 300 }
  };

  function defaultConfig() {
    return {
      ranks: [...DEFAULT_RANKS],
      results: [...DEFAULT_RESULTS],
      matrix: JSON.parse(JSON.stringify(DEFAULT_MATRIX)),
      adminPassword: null
    };
  }

  let entries = [];
  let config = defaultConfig();
  let photoDataUrl = null;
  let settingsUnlocked = false;

  const $ = (id) => document.getElementById(id);

  // ---------- Tabs ----------
  document.querySelectorAll('.mt-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.mt-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.mt-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      if (tab.dataset.tab === 'ranking') renderLeaderboard();
      if (tab.dataset.tab === 'history') renderHistory();
      if (tab.dataset.tab === 'settings') renderSettingsGate();
    });
  });

  $('matchDate').value = new Date().toISOString().slice(0, 10);

  // ---------- Points preview ----------
  function currentPercent() {
    const rankName = $('matchRank').value;
    const resultName = $('matchResult').value;
    if (!rankName || !resultName) return 0;
    const row = config.matrix[resultName];
    if (!row || row[rankName] === undefined) return 0;
    return row[rankName];
  }

  function updatePointsPreview() {
    const fee = Number($('entryFee').value) || 0;
    const pct = currentPercent();
    const pts = Math.round(fee * pct / 100);
    $('pointsPreview').value = pts.toLocaleString() + ' pt （還元率 ' + pct + '%）';
  }

  ['entryFee'].forEach(id => $(id).addEventListener('input', updatePointsPreview));

  // ---------- Photo handling ----------
  $('photoDrop').addEventListener('click', () => $('photoInput').click());
  $('photoInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    let workingFile = file;
    const isHeic = /heic|heif/i.test(file.type) || /\.hei[cf]$/i.test(file.name);
    if (isHeic) {
      if (typeof heic2any !== 'function') {
        alert('この写真形式（HEIC）を変換する準備がまだ整っていません。数秒待ってからもう一度お試しください。');
        $('photoInput').value = '';
        return;
      }
      $('photoDrop').textContent = '写真を変換中...';
      try {
        const converted = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.8 });
        workingFile = Array.isArray(converted) ? converted[0] : converted;
      } catch (err) {
        alert('この写真（HEIC形式）を変換できませんでした。別の写真を選ぶか、共有前にJPEG形式で保存してからお試しください。');
        $('photoInput').value = '';
        $('photoDrop').textContent = photoDataUrl ? '写真を変更する' : 'タップして写真を選択（任意）';
        return;
      }
    }

    compressImage(workingFile, (dataUrl) => {
      photoDataUrl = dataUrl;
      $('photoPreview').src = dataUrl;
      $('photoPreview').style.display = 'block';
      $('photoClear').style.display = 'inline-block';
      $('photoDrop').textContent = '写真を変更する';
    }, () => {
      alert('この画像を読み込めませんでした。別の写真でお試しください。');
      $('photoInput').value = '';
      $('photoDrop').textContent = photoDataUrl ? '写真を変更する' : 'タップして写真を選択（任意）';
    });
  });
  $('photoClear').addEventListener('click', () => {
    photoDataUrl = null;
    $('photoInput').value = '';
    $('photoPreview').style.display = 'none';
    $('photoClear').style.display = 'none';
    $('photoDrop').textContent = 'タップして写真を選択（任意）';
  });

  function compressImage(file, cb, onError) {
    const reader = new FileReader();
    reader.onerror = () => { if (onError) onError(); };
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => { if (onError) onError(); };
      img.onload = () => {
        const tryCompress = (maxW, quality) => {
          const scale = Math.min(1, maxW / img.width);
          const canvas = document.createElement('canvas');
          canvas.width = Math.max(1, Math.round(img.width * scale));
          canvas.height = Math.max(1, Math.round(img.height * scale));
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          if (dataUrl.length > 220000 && maxW > 200) {
            tryCompress(Math.round(maxW * 0.75), Math.max(0.3, quality - 0.1));
          } else {
            cb(dataUrl);
          }
        };
        tryCompress(480, 0.55);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ---------- Storage (server API backed by Vercel KV, shared by all participants) ----------
  async function apiGet(path) {
    const res = await fetch(path);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }
  async function apiSend(path, method, body) {
    const res = await fetch(path, {
      method,
      headers: body !== undefined ? { 'Content-Type': 'application/json' } : undefined,
      body: body !== undefined ? JSON.stringify(body) : undefined
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json().catch(() => ({}));
  }

  async function loadData() {
    let apiOk = true;

    try {
      const data = await apiGet('/api/entries');
      entries = Array.isArray(data.entries) ? data.entries : [];
    } catch (e) { apiOk = false; entries = []; }

    try {
      const data = await apiGet('/api/config');
      config = data && data.config ? data.config : defaultConfig();
    } catch (e) { apiOk = false; config = defaultConfig(); }

    const w = $('storageWarning');
    if (!apiOk) {
      w.textContent = 'サーバーへの接続に失敗しました。Vercelのデータベース（KV）が設定されているか確認してください。';
      w.style.display = 'block';
    } else {
      w.style.display = 'none';
    }

    if (!config.ranks || !config.ranks.length) config = defaultConfig();

    updatePlayerList();
    populateSelects();
    renderSettingsUI();
    renderSettingsGate();
    renderLeaderboard();
    renderHistory();
    updatePointsPreview();
  }

  async function saveEntry(entry) { await apiSend('/api/entries', 'POST', entry); }
  async function deleteEntryFromStorage(id) { await apiSend('/api/entries?id=' + encodeURIComponent(id), 'DELETE'); }
  async function saveConfig() { await apiSend('/api/config', 'POST', config); }

  function normalizeName(name) {
    return String(name || '').replace(/[\s　]+/g, '').toLowerCase();
  }

  function canonicalPlayerName(rawName) {
    const key = normalizeName(rawName);
    const existing = entries.find(en => normalizeName(en.playerName) === key);
    return existing ? existing.playerName : rawName;
  }

  function updatePlayerList() {
    const names = new Map();
    entries.forEach(e => {
      const key = normalizeName(e.playerName);
      if (key && !names.has(key)) names.set(key, e.playerName);
    });
    const dl = $('playerList');
    dl.innerHTML = '';
    names.forEach(n => { const opt = document.createElement('option'); opt.value = n; dl.appendChild(opt); });
  }

  function populateSelects() {
    const rankSel = $('matchRank');
    const resultSel = $('matchResult');
    rankSel.innerHTML = config.ranks.map(r => `<option value="${escapeAttr(r)}">${escapeHtml(r)}</option>`).join('');
    resultSel.innerHTML = config.results.map(r => `<option value="${escapeAttr(r)}">${escapeHtml(r)}</option>`).join('');
    rankSel.onchange = updatePointsPreview;
    resultSel.onchange = updatePointsPreview;
  }

  // ---------- Submit / Edit ----------
  let editingEntryId = null;
  let editingCreatedAt = null;
  let editingSettled = false;

  function startEditEntry(entry) {
    editingEntryId = entry.id;
    editingCreatedAt = entry.createdAt;
    editingSettled = !!entry.settled;

    $('playerName').value = entry.playerName;
    $('matchName').value = entry.matchName;
    $('matchDate').value = entry.matchDate || '';
    $('matchRank').value = entry.rankName;
    $('matchResult').value = entry.resultName;
    $('entryFee').value = entry.entryFee;
    $('matchNote').value = entry.note || '';

    photoDataUrl = entry.photo || null;
    if (photoDataUrl) {
      $('photoPreview').src = photoDataUrl;
      $('photoPreview').style.display = 'block';
      $('photoClear').style.display = 'inline-block';
      $('photoDrop').textContent = '写真を変更する';
    } else {
      $('photoInput').value = '';
      $('photoPreview').style.display = 'none';
      $('photoClear').style.display = 'none';
      $('photoDrop').textContent = 'タップして写真を選択（任意）';
    }

    updatePointsPreview();
    $('submitMatch').textContent = 'この記録を更新する';
    $('editBanner').style.display = 'flex';

    document.querySelectorAll('.mt-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.mt-panel').forEach(p => p.classList.remove('active'));
    document.querySelector('.mt-tab[data-tab="input"]').classList.add('active');
    $('panel-input').classList.add('active');
  }

  function cancelEdit() {
    editingEntryId = null;
    editingCreatedAt = null;
    editingSettled = false;
    $('playerName').value = '';
    $('matchName').value = '';
    $('entryFee').value = '';
    $('matchNote').value = '';
    $('photoClear').click();
    $('submitMatch').textContent = '結果を登録する';
    $('editBanner').style.display = 'none';
    updatePointsPreview();
  }
  $('cancelEditBtn').addEventListener('click', cancelEdit);

  $('submitMatch').addEventListener('click', async () => {
    const errBox = $('submitError');
    errBox.style.display = 'none';

    const playerName = canonicalPlayerName($('playerName').value.trim());
    const matchName = $('matchName').value.trim();
    const matchDate = $('matchDate').value;
    const rankName = $('matchRank').value;
    const resultName = $('matchResult').value;
    const entryFee = Number($('entryFee').value) || 0;
    const note = $('matchNote').value.trim();

    if (!playerName) { alert('選手名を入力してください。'); return; }
    if (!matchName) { alert('試合名を入力してください。'); return; }
    if (!rankName || !resultName) { alert('試合ランクと結果を選択してください。'); return; }

    const pct = currentPercent();
    const points = Math.round(entryFee * pct / 100);
    const isEditing = !!editingEntryId;

    const btn = $('submitMatch');
    btn.disabled = true;
    btn.textContent = isEditing ? '更新中...' : '登録中...';

    const newEntry = {
      id: isEditing ? editingEntryId : ('e_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7)),
      playerName, matchName, matchDate,
      rankName, resultName,
      entryFee, percent: pct, points,
      note,
      photo: photoDataUrl,
      createdAt: isEditing ? editingCreatedAt : Date.now(),
      settled: isEditing ? editingSettled : false
    };

    try {
      await saveEntry(newEntry);
    } catch (err) {
      // Retry once automatically in case of a transient failure
      try {
        await new Promise(res => setTimeout(res, 400));
        await saveEntry(newEntry);
      } catch (err2) {
        const detail = (err2 && err2.message) ? err2.message : String(err2);
        errBox.textContent = '保存に失敗しました（詳細: ' + detail + '）。もう一度お試しいただき、直らない場合はこのメッセージの内容を教えてください。';
        errBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = isEditing ? 'この記録を更新する' : '結果を登録する';
        return;
      }
    }

    if (isEditing) {
      const idx = entries.findIndex(e => e.id === newEntry.id);
      if (idx >= 0) entries[idx] = newEntry; else entries.push(newEntry);
    } else {
      entries.push(newEntry);
    }

    editingEntryId = null;
    editingCreatedAt = null;
    $('editBanner').style.display = 'none';

    btn.disabled = false;
    btn.textContent = '結果を登録する';
    const toast = $('submitToast');
    toast.textContent = isEditing ? '✓ 更新しました' : '✓ 登録しました';
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2000);

    $('playerName').value = '';
    $('matchName').value = '';
    $('entryFee').value = '';
    $('matchNote').value = '';
    $('photoClear').click();
    updatePointsPreview();
    updatePlayerList();
    renderLeaderboard();
    renderHistory();
  });

  // ---------- Settings password gate ----------
  function renderSettingsGate() {
    const gate = $('settingsLocked');
    const wrap = $('settingsUnlockedWrap');

    if (settingsUnlocked) {
      gate.style.display = 'none';
      wrap.style.display = 'block';
      return;
    }
    wrap.style.display = 'none';
    gate.style.display = 'block';

    if (!config.adminPassword) {
      gate.innerHTML = `
        <p class="mt-settings-desc">還元率を編集するためのパスワードをまだ設定していません。最初にパスワードを決めてください。</p>
        <label class="mt-label">新しいパスワード</label>
        <input type="password" id="setPwInput" placeholder="パスワードを入力">
        <button class="mt-submit" id="setPwBtn" style="margin-top:12px;">パスワードを設定してロック解除</button>
        <p class="mt-settings-desc" style="margin-top:10px;">※ ブラウザ上で動くアプリのため、これは誤操作防止のための簡易的な仕組みです。厳密なアクセス制御ではありません。</p>
      `;
      $('setPwBtn').addEventListener('click', async () => {
        const pw = $('setPwInput').value;
        if (!pw) { alert('パスワードを入力してください。'); return; }
        config.adminPassword = pw;
        await saveConfig();
        settingsUnlocked = true;
        renderSettingsGate();
      });
    } else {
      gate.innerHTML = `
        <p class="mt-settings-desc">還元率を編集するにはパスワードが必要です。</p>
        <label class="mt-label">パスワード</label>
        <input type="password" id="unlockPwInput" placeholder="パスワードを入力">
        <button class="mt-submit" id="unlockBtn" style="margin-top:12px;">ロック解除</button>
        <div class="mt-error" id="unlockError">パスワードが違います。</div>
      `;
      const tryUnlock = () => {
        const pw = $('unlockPwInput').value;
        if (pw === config.adminPassword) {
          settingsUnlocked = true;
          renderSettingsGate();
        } else {
          $('unlockError').style.display = 'block';
        }
      };
      $('unlockBtn').addEventListener('click', tryUnlock);
      $('unlockPwInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });
    }
  }

  function bindRelockAndPasswordChange() {
    const relockBtn = $('relockBtn');
    if (relockBtn) relockBtn.addEventListener('click', () => { settingsUnlocked = false; renderSettingsGate(); });

    const changeBtn = $('changePwBtn');
    if (changeBtn) changeBtn.addEventListener('click', async () => {
      const pw = $('changePwInput').value;
      if (!pw) { alert('新しいパスワードを入力してください。'); return; }
      config.adminPassword = pw;
      await saveConfig();
      $('changePwInput').value = '';
      const toast = $('changePwToast');
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 2000);
    });
  }

  // ---------- Settings UI ----------
  function renderSettingsUI() {
    renderChips();
    renderMatrixTable();
    bindRelockAndPasswordChange();
  }

  function renderChips() {
    const rankChips = $('rankChips');
    rankChips.innerHTML = config.ranks.map(r => `
      <span class="mt-chip">${escapeHtml(r)}<button data-remove-rank="${escapeAttr(r)}">✕</button></span>
    `).join('');
    rankChips.querySelectorAll('[data-remove-rank]').forEach(btn => {
      btn.addEventListener('click', () => {
        const name = btn.dataset.removeRank;
        if (config.ranks.length <= 1) { alert('最低1つはランクが必要です。'); return; }
        config.ranks = config.ranks.filter(r => r !== name);
        config.results.forEach(res => { if (config.matrix[res]) delete config.matrix[res][name]; });
        renderSettingsUI();
        populateSelects();
        updatePointsPreview();
      });
    });

    const resultChips = $('resultChips');
    resultChips.innerHTML = config.results.map(r => `
      <span class="mt-chip">${escapeHtml(r)}<button data-remove-result="${escapeAttr(r)}">✕</button></span>
    `).join('');
    resultChips.querySelectorAll('[data-remove-result]').forEach(btn => {
      btn.addEventListener('click', () => {
        const name = btn.dataset.removeResult;
        if (config.results.length <= 1) { alert('最低1つは結果が必要です。'); return; }
        config.results = config.results.filter(r => r !== name);
        delete config.matrix[name];
        renderSettingsUI();
        populateSelects();
        updatePointsPreview();
      });
    });
  }

  $('addRankBtn').addEventListener('click', () => {
    const name = $('newRankName').value.trim();
    if (!name) return;
    if (config.ranks.includes(name)) { alert('同じ名前のランクが既にあります。'); return; }
    config.ranks.push(name);
    config.results.forEach(res => {
      if (!config.matrix[res]) config.matrix[res] = {};
      config.matrix[res][name] = 0;
    });
    $('newRankName').value = '';
    renderSettingsUI();
    populateSelects();
    updatePointsPreview();
  });

  $('addResultBtn').addEventListener('click', () => {
    const name = $('newResultName').value.trim();
    if (!name) return;
    if (config.results.includes(name)) { alert('同じ名前の結果が既にあります。'); return; }
    config.results.push(name);
    const row = {};
    config.ranks.forEach(rk => { row[rk] = 0; });
    config.matrix[name] = row;
    $('newResultName').value = '';
    renderSettingsUI();
    populateSelects();
    updatePointsPreview();
  });

  function renderMatrixTable() {
    const table = $('matrixTable');
    let html = '<thead><tr><th></th>' + config.ranks.map(r => `<th>${escapeHtml(r)}</th>`).join('') + '</tr></thead><tbody>';
    config.results.forEach(res => {
      html += '<tr><th>' + escapeHtml(res) + '</th>' + config.ranks.map(rk => {
        const val = (config.matrix[res] && config.matrix[res][rk] !== undefined) ? config.matrix[res][rk] : 0;
        return `<td><input type="number" class="mx-cell" data-result="${escapeAttr(res)}" data-rank="${escapeAttr(rk)}" value="${val}"></td>`;
      }).join('') + '</tr>';
    });
    html += '</tbody>';
    table.innerHTML = html;
  }

  $('saveSettings').addEventListener('click', async () => {
    document.querySelectorAll('.mx-cell').forEach(input => {
      const res = input.dataset.result;
      const rk = input.dataset.rank;
      if (!config.matrix[res]) config.matrix[res] = {};
      config.matrix[res][rk] = Number(input.value) || 0;
    });
    await saveConfig();
    populateSelects();
    updatePointsPreview();
    const toast = $('settingsToast');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2000);
  });

  // ---------- Leaderboard ----------
  function entryYear(e) {
    return e.matchDate ? e.matchDate.slice(0, 4) : null;
  }

  let rankingYearFilter = 'all';

  function computeStandings(yearFilter) {
    const stats = {};
    entries.forEach(e => {
      if (yearFilter !== 'all' && entryYear(e) !== yearFilter) return;
      const key = normalizeName(e.playerName);
      if (!key) return;
      if (!stats[key]) stats[key] = { name: e.playerName, played: 0, points: 0 };
      const s = stats[key];
      s.played++;
      s.points += e.points;
    });
    return Object.values(stats).sort((a, b) => b.points - a.points);
  }

  function renderYearRow() {
    const row = $('rankingYearRow');
    const years = Array.from(new Set(entries.map(entryYear).filter(Boolean))).sort((a, b) => b - a);

    if (years.length === 0) { row.innerHTML = ''; return; }
    if (rankingYearFilter !== 'all' && !years.includes(rankingYearFilter)) rankingYearFilter = 'all';

    const options = [{ key: 'all', label: '全期間' }, ...years.map(y => ({ key: y, label: y + '年' }))];
    row.innerHTML = options.map(o =>
      `<button type="button" class="mt-year-pill${o.key === rankingYearFilter ? ' active' : ''}" data-year="${escapeAttr(o.key)}">${escapeHtml(o.label)}</button>`
    ).join('');

    row.querySelectorAll('.mt-year-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        rankingYearFilter = btn.dataset.year;
        renderLeaderboard();
      });
    });
  }

  function renderLeaderboard() {
    renderYearRow();
    const board = $('leaderboard');
    const standings = computeStandings(rankingYearFilter);
    if (standings.length === 0) {
      board.innerHTML = '<div class="mt-empty">まだ試合結果がありません。「結果を入力」タブから登録してください。</div>';
      return;
    }
    board.innerHTML = standings.map((s, i) => `
      <div class="mt-lb-row">
        <div class="mt-rank">${i + 1}</div>
        <div>
          <div class="mt-lb-name">${escapeHtml(s.name)}</div>
          <div class="mt-lb-sub">${s.played}試合出場</div>
        </div>
        <div class="mt-lb-points">${s.points.toLocaleString()}<span>pt</span></div>
      </div>
    `).join('');
  }

  // ---------- History ----------
  function renderHistory() {
    const list = $('historyList');
    if (entries.length === 0) {
      list.innerHTML = '<div class="mt-empty">履歴はまだありません。</div>';
      return;
    }
    const sorted = [...entries].sort((a, b) => b.createdAt - a.createdAt);
    list.innerHTML = sorted.map(e => `
      <div class="mt-hist-item${e.settled ? ' is-settled' : ''}">
        <label class="mt-settle-toggle">
          <input type="checkbox" class="mt-settle-checkbox" data-id="${e.id}"${e.settled ? ' checked' : ''}>
          <span>${e.settled ? 'ポイント清算済' : 'ポイント未精算'}</span>
        </label>
        ${e.photo ? `<img class="mt-hist-thumb" src="${e.photo}">` : `<div class="mt-hist-thumb"></div>`}
        <div class="mt-hist-main">
          <div class="mt-hist-title">${escapeHtml(e.playerName)} ・ ${escapeHtml(e.matchName)}</div>
          <div class="mt-hist-tags">${e.matchDate || ''} ・ ${escapeHtml(e.rankName)} ・ ${escapeHtml(e.resultName)} ・ 還元率${e.percent}% ・ フィー${Number(e.entryFee).toLocaleString()}円</div>
          ${e.note ? `<div class="mt-hist-note">${escapeHtml(e.note)}</div>` : ''}
        </div>
        <div class="mt-hist-pts">${e.points.toLocaleString()}<span>pt</span><small>還元ポイント</small></div>
        <div class="mt-hist-actions">
          <button class="mt-edit" data-id="${e.id}" title="編集する">✎</button>
          <button class="mt-del" data-id="${e.id}" title="削除する">✕</button>
        </div>
      </div>
    `).join('');

    list.querySelectorAll('.mt-settle-checkbox').forEach(cb => {
      cb.addEventListener('change', async () => {
        const entry = entries.find(e => e.id === cb.dataset.id);
        if (!entry) return;
        const prevSettled = entry.settled;
        entry.settled = cb.checked;
        try {
          await saveEntry(entry);
        } catch (err) {
          entry.settled = prevSettled;
          alert('更新に失敗しました。もう一度お試しください。');
          renderHistory();
          return;
        }
        renderHistory();
      });
    });

    list.querySelectorAll('.mt-edit').forEach(btn => {
      btn.addEventListener('click', () => {
        const entry = entries.find(e => e.id === btn.dataset.id);
        if (entry) startEditEntry(entry);
      });
    });

    list.querySelectorAll('.mt-del').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('この記録を削除しますか？')) return;
        try {
          await deleteEntryFromStorage(btn.dataset.id);
        } catch (err) {
          alert('削除に失敗しました。もう一度お試しください。');
          return;
        }
        entries = entries.filter(e => e.id !== btn.dataset.id);
        if (editingEntryId === btn.dataset.id) cancelEdit();
        renderHistory();
        renderLeaderboard();
        updatePlayerList();
      });
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
  function escapeAttr(str) {
    return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
  }

  loadData();
})();
</script>
